name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Tests — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zlib, mbstring, openssl, gd
          coverage: none

      # composer.lock is not committed, so dependencies resolve fresh. The
      # cache is keyed on composer.json plus the PHP version, since a resolved
      # tree can differ between versions.
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: zlib, mbstring, openssl, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.1-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.1-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # PHPStan exhausts the default 128M limit on this codebase.
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
