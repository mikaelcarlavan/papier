name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Tests — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # PHPUnit 11 requires PHP 8.2. The library itself supports 8.1, which
        # the compatibility job below covers.
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zlib, mbstring, openssl, gd
          coverage: none

      # composer.lock is not committed, so dependencies resolve fresh. The
      # cache is keyed on composer.json plus the PHP version, since a resolved
      # tree can differ between versions.
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always

  compatibility:
    name: PHP 8.1 compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: zlib, mbstring, openssl, gd
          coverage: none

      # composer.json declares php >=8.1, but the dev toolchain cannot be
      # installed there. --no-dev is not enough: without a lock file Composer
      # still resolves require-dev and fails. Papier has no production
      # dependencies, so generating the autoloader is the whole install.
      - name: Generate the autoloader
        run: composer dump-autoload --no-interaction

      - name: Lint every source file
        run: find src tools -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Smoke test
        run: php tools/smoke.php

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zlib, mbstring, openssl, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # PHPStan exhausts the default 128M limit on this codebase. The analysis
      # targets 8.1, the lowest version composer.json supports.
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
